# LearnSphere API Gateway.
# React -> Gateway -> {service}. Each downstream service still enforces its
# own JWT check and RBAC - Nginx here is routing + rate limiting + logging,
# not the source of truth for auth.

limit_req_zone $binary_remote_addr zone=learnsphere_api:10m rate=25r/s;

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    limit_req zone=learnsphere_api burst=50 nodelay;
    client_max_body_size 200M; # video uploads go through here to media-service

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
    if ($request_method = OPTIONS) {
        return 204;
    }

    location /api/auth/          { proxy_pass http://auth-service:4001/;          include /etc/nginx/proxy_params.conf; }
    location /api/admin/         { proxy_pass http://admin-service:4007/;         include /etc/nginx/proxy_params.conf; }
    location /api/learning/      { proxy_pass http://learning-service:4002/;      include /etc/nginx/proxy_params.conf; }
    location /api/assessment/    { proxy_pass http://assessment-service:4003/;    include /etc/nginx/proxy_params.conf; }
    location /api/communication/ { proxy_pass http://communication-service:4004/; include /etc/nginx/proxy_params.conf; }
    location /api/media/         { proxy_pass http://media-service:4005/;         include /etc/nginx/proxy_params.conf; }
    location /api/analytics/     { proxy_pass http://analytics-service:4006/;     include /etc/nginx/proxy_params.conf; }

    location /health {
        return 200 '{"service":"gateway","status":"ok"}';
        add_header Content-Type application/json;
    }
}
